<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
</head>
<body class="app">

<div class="nav">
  <a id="homeLink">Home</a>
  <a id="ratingsLink">Ratings</a>
  <a id="notesLink">Notes</a>
  <a id="adminLink">Admin</a>
</div>

<h1>Admin Panel</h1>

<select id="monthSelect"></select>

<div id="adminPanel"></div>

<script src="app.js"></script>

<script>
function buildMonthOptions() {
  const select = document.getElementById("monthSelect");
  const current = new Date();
  select.innerHTML = Array.from({ length: 12 }, (_, i) => {
    const date = new Date(current.getFullYear(), current.getMonth() - i, 1);
    return `<option value="${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}">${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}</option>`;
  }).join("");
}

document.addEventListener("DOMContentLoaded", () => {
  buildMonthOptions();
  document.getElementById("monthSelect").addEventListener("change", loadAdmin);
  loadAdmin();
});

async function loadAdmin() {
  const month = document.getElementById("monthSelect").value;

  const ratings = await post("getRatingsByMonth", { month });
  const notes = await post("getNotesByMonth", { month });

  const panel = document.getElementById("adminPanel");

  panel.innerHTML = `
    <h2>Ratings</h2>
    <pre>${JSON.stringify(ratings, null, 2)}</pre>

    <h2>Notes</h2>
    <pre>${JSON.stringify(notes, null, 2)}</pre>
  `;
}
</script>

</body>
</html>
