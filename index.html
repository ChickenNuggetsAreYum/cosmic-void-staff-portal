<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cosmic Void Staff Portal</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="header">
    <img src="https://cdn.discordapp.com/attachments/1433974277350096947/1488346333487169586/CV_easter_icon.png" class="logo">
    <h1>Cosmic Void</h1>
    <p>Staff Portal</p>
  </div>

  <div class="menu">
    <a href="#" data-page="reviews" class="active">Reviews</a>
    <a href="#" data-page="admin" class="hidden">Admin</a>
  </div>

  <div class="container">

    <!-- REVIEWS PAGE -->
    <div id="reviewsPage">

      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 class="center-title" style="margin: 0; flex: 1;">Monthly Ratings</h2>
        <button id="reviewsRefresh">🔄 Refresh</button>
      </div>

      <div id="loadingSpinner" class="spinner"></div>

      <!-- IMPORTANT: Cards get injected here -->
      <div id="reviewsBox" class="card-list"></div>

    </div>

    <!-- ADMIN PAGE -->
    <div id="adminPage" class="hidden">
      <h2 class="center-title">Admin Ratings Dashboard</h2>

      <div class="admin-controls">
        <label for="adminMonthSelect">Month</label>
        <select id="adminMonthSelect"></select>
        <button id="adminReload">Load Month</button>
        <button id="adminRefresh">🔄 Refresh</button>
      </div>

      <!-- IMPORTANT: Cards get injected here -->
      <div id="adminList" class="card-list"></div>
    </div>

    <!-- REVOKED -->
    <div id="revokedPage" class="hidden">
      <div class="card">
        <h2>Access Revoked</h2>
        <p>Your access to the Staff Portal has been revoked.</p>
        <p>If this is maintenance or a staff status change, your data is still preserved for reporting.</p>
      </div>
    </div>

  </div>

  <script>
    // SIMPLE CARD TOGGLE (ensures expansion works globally)
    function toggleCard(card) {
      card.classList.toggle("expanded");
    }
  </script>

  <script src="app.js"></script>
</body>
</html>
