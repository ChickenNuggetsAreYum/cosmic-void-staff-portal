<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
</head>

<body class="app">

<div id="app" class="layout hidden">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="title">Cosmic Void</div>

    <div class="channel active" data-tab="home"># home</div>
    <div class="channel" data-tab="ratings"># ratings</div>
    <div class="channel" data-tab="notes"># notes</div>
    <div class="channel" id="adminTab" data-tab="admin"># admin</div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div id="home" class="tab">
      <h2>Home</h2>
      <div id="statusText"></div>
    </div>

    <div id="ratings" class="tab hidden">
      <h2>Ratings</h2>
      <div id="staffRatings"></div>
    </div>

    <div id="notes" class="tab hidden">
      <h2>Notes</h2>
      <div id="staffNotes"></div>
    </div>

    <div id="admin" class="tab hidden">
      <h2>Admin</h2>
      <div id="adminPanel"></div>
    </div>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>
